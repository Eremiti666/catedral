<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Catedral & Sisters — Documentação Oficial</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Topbar / Cabeçalho Superior Fixo -->
  <header class="topbar">
    <div class="topbar-brand">
      <i class="fa-solid fa-church logo-icon"></i>
      <div class="brand-text">
        <h1>CATEDRAL</h1>
        <span>SAGRADO SILÊNCIO DE LÍDIA & SISTERS</span>
      </div>
    </div>

    <!-- Botões que Alternam as Páginas -->
    <div class="topbar-actions">
      <button onclick="mudarPagina('principal')" id="btnPrincipal" class="btn-action active">
        <i class="fa-solid fa-file-pdf"></i> <span>Apendice de Lidia</span>
      </button>
      
      <button onclick="mudarPagina('livro')" id="btnLivro" class="btn-action">
        <i class="fa-solid fa-book-open"></i> <span>Livro de Lidia</span>
      </button>
    </div>
  </header>

  <!-- Área onde as "Páginas" dos PDFs mudam -->
  <main class="viewer-layout">
    
    <!-- Página 1: Apendice de Lidia -->
    <div id="paginaPrincipal" class="pdf-page active">
      <div class="section-header">
        <h2>Apendice de Lidia</h2>
        <a href="assets/Apendice de Lidia.pdf" download class="btn-download">
          <i class="fa-solid fa-download"></i> Baixar PDF
        </a>
      </div>
      <div class="pdf-wrapper">
        <iframe src="assets/Apendice de Lidia.pdf#toolbar=1&navpanes=0" title="Apendice de Lidia"></iframe>
      </div>
    </div>

    <!-- Página 2: Livro de Lídia -->
    <div id="paginaLivro" class="pdf-page">
      <div class="section-header">
        <h2>Livro de Lidia</h2>
        <a href="assets/Livro de Lidia.pdf" download class="btn-download">
          <i class="fa-solid fa-download"></i> Baixar PDF
        </a>
      </div>
      <div class="pdf-wrapper">
        <iframe src="assets/Livro de Lidia.pdf#toolbar=1&navpanes=0" title="Livro de Lidia"></iframe>
      </div>
    </div>

  </main>

  <script src="script.js"></script>
</body>
</html>
